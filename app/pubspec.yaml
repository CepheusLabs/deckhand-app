name: deckhand
description: Deckhand desktop app — installs Klipper/Kalico on 3D printers.
version: 0.1.0+1
publish_to: none

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.0.0
  flutter_secure_storage: ^10.1.0
  slang: ^4.0.0
  slang_flutter: ^4.0.0
  path_provider: ^2.1.0
  path: ^1.9.0
  cupertino_icons: ^1.0.8
  window_manager: ^0.4.3

  deckhand_core:
    path: ../packages/deckhand_core
  deckhand_profiles:
    path: ../packages/deckhand_profiles
  deckhand_ssh:
    path: ../packages/deckhand_ssh
  deckhand_flash:
    path: ../packages/deckhand_flash
  deckhand_discovery:
    path: ../packages/deckhand_discovery
  deckhand_ui:
    path: ../packages/deckhand_ui

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  deckhand_lints:
    path: ../packages/deckhand_lints

# Pin transitive archive to a single version across the dep graph.
# deckhand_core declares the runtime requirement; this override
# protects every package in the workspace from the cross-package
# version drift documented in deckhand_core's pubspec comment.
dependency_overrides:
  archive: 4.0.9

flutter:
  uses-material-design: true
  assets:
    # Profile-trust keyring. See docs/PROFILE-TRUST.md. Lives at
    # `app/assets/keyring.asc` rather than under deckhand_core's
    # tree because the `packages/<pkg>/...` asset indirection
    # requires the owning package to declare a `flutter:` assets
    # block, and deckhand_core is deliberately pure-Dart so the
    # HITL driver can compile against it. The canonical asset key
    # is `TrustKeyring.assetKey` in deckhand_core; the loader is
    # `loadBundledTrustKeyring` in deckhand_ui.
    - assets/keyring.asc
