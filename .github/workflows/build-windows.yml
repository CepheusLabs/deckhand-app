name: Build Windows (self-hosted)

# Lightweight Windows build that runs on the org's self-hosted runner.
#
# Why a separate workflow from `release.yml`:
#   - `release.yml` is the canonical signed-MSIX path used for tagged
#     releases; it's slower and produces installer artifacts.
#   - This workflow exists for fast iteration: build the Flutter
#     Windows binary on `cl-windowsdesktop-primary`, no codesigning,
#     no MSIX packaging, just a zipped Release\ tree for smoke-testing.
#   - Mirrors `build-macos.yml` so dev-loop ergonomics are symmetric
#     across platforms.
#
# Trigger: workflow_dispatch only. Manual on-demand from the
# Actions tab or via `gh workflow run build-windows.yml`.
#
# Shell choice: every step that does anything beyond a single command
# is `shell: pwsh`. We deliberately avoid `shell: bash` on this
# Windows runner — `bash.exe` resolves to the WSL stub
# (`C:\WINDOWS\system32\bash.EXE`) which has no installed distribution,
# rather than Git Bash. Forcing pwsh sidesteps the PATH ordering trap.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch/tag/SHA to build"
        required: false
        default: main
      version:
        description: "DECKHAND_VERSION stamp (default: dev-<sha>)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: Windows zip
    runs-on: [self-hosted, windows]
    timeout-minutes: 45
    concurrency:
      group: build-windows
      cancel-in-progress: false
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || 'main' }}

      # Resolve the version stamp once. If the dispatcher passed
      # an explicit `version`, use that; otherwise produce a
      # short-sha label so the resulting binary is correlatable.
      - name: Resolve version
        id: v
        run: |
          $explicit = "${{ inputs.version }}"
          if ($explicit) {
            $v = $explicit
          } else {
            $sha = (& git rev-parse --short HEAD).Trim()
            $v = "dev-$sha"
          }
          "version=$v" | Out-File -Append -Encoding utf8 $env:GITHUB_OUTPUT
          Write-Host "::notice::Building Windows with DECKHAND_VERSION=$v"

      # Verify the runner-side pre-installed toolchain. The org's
      # self-hosted Windows runner ships with Flutter + Go
      # provisioned at the OS level — this workflow refuses to
      # install over it to avoid drift between dev-loop builds and
      # what's on the box (and to skip the multi-minute first-run
      # install). If any of these checks fail, fix the runner, not
      # the workflow.
      - name: Verify toolchain
        run: |
          flutter --version
          dart --version
          go version

      # Build the Go binaries first. CGO disabled for portability
      # (matches release.yml). GOOS/GOARCH default to the runner's
      # native target — cl-windowsdesktop-primary is windows/amd64.
      - name: Build sidecar + helper
        working-directory: sidecar
        env:
          CGO_ENABLED: "0"
          STAMP: ${{ steps.v.outputs.version }}
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          foreach ($cmd in @("deckhand-sidecar", "deckhand-elevated-helper")) {
            & go build -trimpath `
              -ldflags "-s -w -X main.Version=$env:STAMP" `
              -o "dist/$cmd.exe" `
              "./cmd/$cmd"
            if ($LASTEXITCODE -ne 0) { throw "go build $cmd failed" }
          }
          Get-ChildItem dist

      - name: Pub get
        working-directory: app
        run: flutter pub get

      - name: Ensure Windows platform dir
        working-directory: app
        run: flutter create --platforms=windows --project-name=deckhand .

      - name: Flutter build Windows
        working-directory: app
        env:
          DH_VERSION: ${{ steps.v.outputs.version }}
        run: |
          $ErrorActionPreference = "Stop"
          & flutter build windows `
            --release `
            "--dart-define=DECKHAND_VERSION=$env:DH_VERSION"
          if ($LASTEXITCODE -ne 0) { throw "flutter build windows failed" }

      # Drop the Go binaries next to deckhand.exe so the produced
      # artifact is a self-contained directory the user can run
      # directly. Production releases use the codesigned MSIX path
      # in release.yml; this is a smoke artifact.
      - name: Stage Go binaries next to deckhand.exe
        run: |
          $ErrorActionPreference = "Stop"
          $rel = "app/build/windows/x64/runner/Release"
          if (-not (Test-Path $rel)) {
            Write-Host "::error ::no Release dir produced by flutter build at $rel"
            if (Test-Path "app/build/windows/x64/runner") {
              Get-ChildItem "app/build/windows/x64/runner"
            }
            exit 1
          }
          Copy-Item "sidecar/dist/deckhand-sidecar.exe" -Destination $rel
          Copy-Item "sidecar/dist/deckhand-elevated-helper.exe" -Destination $rel
          Get-ChildItem $rel

      - name: Sanity-check sidecar from inside the Release dir
        run: |
          $ErrorActionPreference = "Stop"
          $rel = "app/build/windows/x64/runner/Release"
          $sidecar = Join-Path $rel "deckhand-sidecar.exe"
          # Spawn the sidecar; ping; shutdown. If any of this fails
          # the binary is broken — fail the run.
          $rpcInput = @(
            '{"jsonrpc":"2.0","id":"1","method":"ping","params":{}}',
            '{"jsonrpc":"2.0","id":"2","method":"shutdown","params":{}}'
          ) -join "`n"
          $out = $rpcInput | & $sidecar 2>$null
          $out | Out-File -Encoding utf8 "$env:RUNNER_TEMP\sidecar.out"
          Write-Host $out
          if (-not ($out -match '"sidecar_version"')) {
            throw "sidecar smoke test failed: no sidecar_version in output"
          }

      # Zip the Release directory into a single artifact. Windows
      # Release/ is a flat directory tree of DLLs + the .exe;
      # Compress-Archive produces a stable filename that includes
      # the version stamp.
      - name: Package Release
        env:
          STAMP: ${{ steps.v.outputs.version }}
        run: |
          $ErrorActionPreference = "Stop"
          $rel = "app/build/windows/x64/runner/Release"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $out = "dist/deckhand-windows-x64-$env:STAMP.zip"
          if (Test-Path $out) { Remove-Item $out }
          Compress-Archive -Path "$rel/*" -DestinationPath $out -Force
          Get-ChildItem dist
          $size = (Get-Item $out).Length / 1MB
          Write-Host ("zip size: {0:N1} MB" -f $size)

      - uses: actions/upload-artifact@v4
        with:
          name: deckhand-windows-${{ steps.v.outputs.version }}
          path: dist/*.zip
          retention-days: 30
          if-no-files-found: error
