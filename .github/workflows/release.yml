name: Release

# Versioning: YY.M.D (today, not zero-padded) + git commit count.
# Matches Printdeck's scripts/build.sh format. Example: 26.4.18+1247,
# tagged v26.4.18-1247 on the repo.
#
# Triggers:
#   - push to main      → compute version, build, tag, release
#   - workflow_dispatch → rebuild on demand (picks HEAD of the provided
#                         ref, defaults to main)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch/tag/SHA to build (default: main)'
        required: false
        default: main
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ------------------------------------------------------------------
  # Resolve the version once, surface it to every downstream job.
  # ------------------------------------------------------------------
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      build: ${{ steps.v.outputs.build }}
      tag: ${{ steps.v.outputs.tag }}
      ref: ${{ steps.v.outputs.ref }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - id: v
        shell: bash
        run: |
          VERSION=$(date -u +"%y.%-m.%-d")
          BUILD=$(git rev-list --count HEAD)
          TAG="v${VERSION}-${BUILD}"
          REF=$(git rev-parse HEAD)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD"     >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "ref=$REF"         >> "$GITHUB_OUTPUT"
          echo "::notice::Deckhand release $VERSION+$BUILD ($TAG at $REF)"

  # ------------------------------------------------------------------
  # Go sidecar + elevated helper for every target OS/arch pair.
  # ------------------------------------------------------------------
  go-binaries:
    name: Go ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: windows, goarch: amd64, runner: windows-latest, ext: ".exe" }
          - { goos: darwin,  goarch: amd64, runner: macos-latest,   ext: ""     }
          - { goos: darwin,  goarch: arm64, runner: macos-latest,   ext: ""     }
          - { goos: linux,   goarch: amd64, runner: ubuntu-latest,  ext: ""     }
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.version.outputs.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache-dependency-path: sidecar/go.sum

      - name: Build sidecar + helper
        working-directory: sidecar
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          STAMP: ${{ needs.version.outputs.version }}+${{ needs.version.outputs.build }}
        shell: bash
        run: |
          mkdir -p dist
          for cmd in deckhand-sidecar deckhand-elevated-helper; do
            go build -trimpath \
              -ldflags "-s -w -X main.Version=${STAMP}" \
              -o "dist/${cmd}${{ matrix.ext }}" \
              "./cmd/${cmd}"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: go-${{ matrix.goos }}-${{ matrix.goarch }}
          path: sidecar/dist/*

  # ------------------------------------------------------------------
  # Flutter desktop builds → installers (one per OS).
  # ------------------------------------------------------------------
  windows:
    name: Windows (MSI)
    needs: [version, go-binaries]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with: { ref: "${{ needs.version.outputs.ref }}" }

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.9"
          channel: stable
          cache: true

      - name: Download Go binaries
        uses: actions/download-artifact@v4
        with:
          name: go-windows-amd64
          path: sidecar/dist

      - name: Pub get
        working-directory: app
        run: flutter pub get

      - name: Ensure platform dirs
        working-directory: app
        run: flutter create --platforms=windows --project-name=deckhand .

      - name: Flutter build
        working-directory: app
        env:
          VERSION: ${{ needs.version.outputs.version }}
          BUILD: ${{ needs.version.outputs.build }}
        shell: bash
        run: flutter build windows --release --build-name="$VERSION" --build-number="$BUILD"

      - name: Set up Inno Setup
        uses: nextgens/inno-setup-action@v1.0.11

      - name: Build installer
        shell: pwsh
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: iscc /dVersion=$env:VERSION packaging\windows\deckhand.iss

      - name: Code-sign (if cert present)
        if: env.SIGNTOOL_CERT_THUMBPRINT != ''
        shell: pwsh
        env:
          SIGNTOOL_CERT_THUMBPRINT: ${{ secrets.WINDOWS_SIGN_THUMBPRINT }}
        run: |
          Get-ChildItem packaging\windows\dist\*.exe | ForEach-Object {
            & signtool sign /sha1 $env:SIGNTOOL_CERT_THUMBPRINT /tr http://timestamp.digicert.com /td sha256 /fd sha256 $_.FullName
          }

      - uses: actions/upload-artifact@v4
        with:
          name: deckhand-windows
          path: packaging/windows/dist/*

  macos:
    name: macOS (DMG)
    needs: [version, go-binaries]
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5
        with: { ref: "${{ needs.version.outputs.ref }}" }

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.9"
          channel: stable
          cache: true

      - name: Download Go binaries
        uses: actions/download-artifact@v4
        with:
          name: go-darwin-${{ matrix.arch }}
          path: sidecar/dist

      - name: Pub get
        working-directory: app
        run: flutter pub get

      - name: Ensure platform dirs
        working-directory: app
        run: flutter create --platforms=macos --project-name=deckhand .

      - name: Flutter build
        working-directory: app
        env:
          VERSION: ${{ needs.version.outputs.version }}
          BUILD: ${{ needs.version.outputs.build }}
        run: flutter build macos --release --build-name="$VERSION" --build-number="$BUILD"

      - name: Build DMG
        env:
          MACOS_SIGN_ID: ${{ secrets.MACOS_SIGN_ID }}
          MACOS_NOTARIZE_APPLE_ID: ${{ secrets.MACOS_NOTARIZE_APPLE_ID }}
          MACOS_NOTARIZE_PASSWORD: ${{ secrets.MACOS_NOTARIZE_PASSWORD }}
          MACOS_NOTARIZE_TEAM_ID: ${{ secrets.MACOS_NOTARIZE_TEAM_ID }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          chmod +x packaging/macos/build_dmg.sh
          ./packaging/macos/build_dmg.sh "$VERSION-${{ matrix.arch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: deckhand-macos-${{ matrix.arch }}
          path: packaging/macos/dist/*

  linux:
    name: Linux (AppImage)
    needs: [version, go-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with: { ref: "${{ needs.version.outputs.ref }}" }

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.9"
          channel: stable
          cache: true

      - name: Download Go binaries
        uses: actions/download-artifact@v4
        with:
          name: go-linux-amd64
          path: sidecar/dist

      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake libgtk-3-dev libsecret-1-dev file

      - name: Pub get
        working-directory: app
        run: flutter pub get

      - name: Ensure platform dirs
        working-directory: app
        run: flutter create --platforms=linux --project-name=deckhand .

      - name: Flutter build
        working-directory: app
        env:
          VERSION: ${{ needs.version.outputs.version }}
          BUILD: ${{ needs.version.outputs.build }}
        run: flutter build linux --release --build-name="$VERSION" --build-number="$BUILD"

      - name: Install appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          sudo mv /tmp/appimagetool /usr/local/bin/appimagetool

      - name: Build AppImage
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          chmod +x packaging/linux/build_appimage.sh
          ./packaging/linux/build_appimage.sh "$VERSION"

      - uses: actions/upload-artifact@v4
        with:
          name: deckhand-linux
          path: packaging/linux/dist/*

  # ------------------------------------------------------------------
  # Tag the commit + publish a GitHub Release with every artifact.
  # ------------------------------------------------------------------
  release:
    name: Publish release
    needs: [version, windows, macos, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.version.outputs.ref }}

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: false

      - name: Create tag
        env:
          TAG: ${{ needs.version.outputs.tag }}
          REF: ${{ needs.version.outputs.ref }}
        run: |
          git config user.name  'cepheus-labs-bot'
          git config user.email 'support@cepheuslabs.com'
          if git rev-parse --verify --quiet "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists — reusing."
          else
            git tag -a "$TAG" "$REF" -m "Deckhand $TAG"
            git push origin "$TAG"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Deckhand ${{ needs.version.outputs.version }}+${{ needs.version.outputs.build }}
          files: release-artifacts/**/*
          draft: false
          generate_release_notes: true
