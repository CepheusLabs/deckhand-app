name: Release

# Versioning: YY.M.D (today, not zero-padded) + git commit count.
# Matches Printdeck's scripts/build.sh format. Example: 26.4.18+1247,
# tagged v26.4.18-1247 on the repo.
#
# Triggers:
#   - push to main      → compute version, build, tag, release
#   - workflow_dispatch → rebuild on demand (picks HEAD of the provided
#                         ref, defaults to main)

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch/tag/SHA to build (default: main)'
        required: false
        default: main
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ------------------------------------------------------------------
  # Resolve the version once, surface it to every downstream job.
  # ------------------------------------------------------------------
  version:
    name: Compute version
    # Self-hosted runners only across the org. GitHub-hosted
    # `ubuntu-latest`/`windows-latest`/`macos-latest` are not used
    # — those would charge against the org's billing minutes and
    # are explicitly off-policy. If a target OS has no runner
    # registered the job queues forever; that's by design.
    runs-on: [self-hosted, linux]
    outputs:
      version: ${{ steps.v.outputs.version }}
      build: ${{ steps.v.outputs.build }}
      tag: ${{ steps.v.outputs.tag }}
      ref: ${{ steps.v.outputs.ref }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - name: Reject placeholder profile keyring
        shell: bash
        run: |
          set -euo pipefail
          keyring="app/assets/keyring.asc"
          if [ ! -s "$keyring" ]; then
            echo "::error ::profile trust keyring is missing at $keyring"
            exit 1
          fi
          if grep -q 'BEGIN DECKHAND PROFILE TRUST PLACEHOLDER' "$keyring"; then
            echo "::error ::release builds must replace app/assets/keyring.asc with production profile-signing public keys"
            exit 1
          fi
          if ! grep -q 'BEGIN PGP PUBLIC KEY BLOCK' "$keyring"; then
            echo "::error ::profile trust keyring is not an armored PGP public key block"
            exit 1
          fi

      - id: v
        shell: bash
        run: |
          VERSION=$(date -u +"%y.%-m.%-d")
          BUILD=$(git rev-list --count HEAD)
          TAG="v${VERSION}-${BUILD}"
          REF=$(git rev-parse HEAD)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD"     >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "ref=$REF"         >> "$GITHUB_OUTPUT"
          echo "::notice::Deckhand release $VERSION+$BUILD ($TAG at $REF)"

  # ------------------------------------------------------------------
  # Go sidecar + elevated helper for every target OS/arch pair.
  # ------------------------------------------------------------------
  go-binaries:
    name: Go ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: version
    # `fromJSON` parses the per-row JSON-string into a label
    # sequence so `runs-on` matches the multi-label runner
    # registration. A bare string here would only match a label
    # that's literally `["self-hosted","windows"]`.
    runs-on: ${{ fromJSON(matrix.runner) }}
    strategy:
      fail-fast: false
      matrix:
        # Self-hosted runner labels per target. Each row's `runner`
        # is the JSON-encoded label tuple GitHub's runner picker
        # reads. Keeping the matrix in this shape (vs. one job per
        # OS) preserves the parallelism — every Go binary builds
        # in parallel on its own runner.
        include:
          - { goos: windows, goarch: amd64, runner: '["self-hosted","windows"]', ext: ".exe" }
          - { goos: darwin,  goarch: amd64, runner: '["self-hosted","macos"]',   ext: ""     }
          - { goos: darwin,  goarch: arm64, runner: '["self-hosted","macos"]',   ext: ""     }
          - { goos: linux,   goarch: amd64, runner: '["self-hosted","linux"]',   ext: ""     }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ needs.version.outputs.ref }}

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: "1.22"
          cache-dependency-path: sidecar/go.sum

      - name: Build sidecar + helper (Windows)
        if: matrix.goos == 'windows'
        working-directory: sidecar
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          STAMP: ${{ needs.version.outputs.version }}+${{ needs.version.outputs.build }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          if (-not (Get-Command windres -ErrorAction SilentlyContinue)) {
            throw "windres is required to embed the elevated-helper UAC manifest"
          }
          $helperDir = "cmd/deckhand-elevated-helper"
          $helperSyso = Join-Path $helperDir "rsrc_windows.syso"
          try {
            Push-Location $helperDir
            try {
              & windres -i resource_windows.rc -O coff -o rsrc_windows.syso
              if ($LASTEXITCODE -ne 0) { throw "windres failed" }
            } finally {
              Pop-Location
            }

            foreach ($cmd in @("deckhand-sidecar", "deckhand-elevated-helper")) {
              $ldflags = "-s -w -X main.Version=$env:STAMP"
              if ($cmd -eq "deckhand-elevated-helper") {
                $ldflags = "$ldflags -H windowsgui"
              }
              & go build -trimpath -ldflags $ldflags -o "dist/$cmd.exe" "./cmd/$cmd"
              if ($LASTEXITCODE -ne 0) { throw "go build failed for $cmd" }
            }
          } finally {
            Remove-Item -Force -ErrorAction SilentlyContinue $helperSyso
          }

      - name: Build sidecar + helper
        if: matrix.goos != 'windows'
        working-directory: sidecar
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          STAMP: ${{ needs.version.outputs.version }}+${{ needs.version.outputs.build }}
        shell: bash
        run: |
          mkdir -p dist
          for cmd in deckhand-sidecar deckhand-elevated-helper; do
            ldflags="-s -w -X main.Version=${STAMP}"
            go build -trimpath \
              -ldflags "$ldflags" \
              -o "dist/${cmd}${{ matrix.ext }}" \
              "./cmd/${cmd}"
          done

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: go-${{ matrix.goos }}-${{ matrix.goarch }}
          path: sidecar/dist/*
          if-no-files-found: error

  # ------------------------------------------------------------------
  # Flutter desktop builds → installers (one per OS).
  # ------------------------------------------------------------------
  windows:
    name: Windows (MSI)
    needs: [version, go-binaries]
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with: { ref: "${{ needs.version.outputs.ref }}" }

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2  # v2
        with:
          flutter-version: "3.38.9"
          channel: stable
          cache: true

      - name: Download Go binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: go-windows-amd64
          path: sidecar/dist

      - name: Pub get
        working-directory: app
        run: flutter pub get

      - name: Ensure platform dirs
        working-directory: app
        run: flutter create --platforms=windows --project-name=deckhand .

      - name: Flutter build
        working-directory: app
        env:
          VERSION: ${{ needs.version.outputs.version }}
          BUILD: ${{ needs.version.outputs.build }}
        shell: pwsh
        run: flutter build windows --release --build-name="$env:VERSION" --build-number="$env:BUILD" --dart-define="DECKHAND_VERSION=$env:VERSION+$env:BUILD"

      - name: Bundle Windows runtime binaries
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $runner = "app\build\windows\x64\runner\Release"
          foreach ($name in @("deckhand-sidecar.exe", "deckhand-elevated-helper.exe")) {
            $source = Join-Path "sidecar\dist" $name
            if (-not (Test-Path -LiteralPath $source -PathType Leaf)) {
              throw "missing Go artifact: $source"
            }
            if ((Get-Item -LiteralPath $source).Length -le 0) {
              throw "empty Go artifact: $source"
            }
            Copy-Item -LiteralPath $source -Destination (Join-Path $runner $name) -Force
          }
          foreach ($name in @("deckhand.exe", "deckhand-sidecar.exe", "deckhand-elevated-helper.exe")) {
            $path = Join-Path $runner $name
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "missing Windows runner payload: $path"
            }
            if ((Get-Item -LiteralPath $path).Length -le 0) {
              throw "empty Windows runner payload: $path"
            }
          }

      - name: Smoke Windows runner payload
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $runner = "app\build\windows\x64\runner\Release"
          $sidecar = Join-Path $runner "deckhand-sidecar.exe"
          $helper = Join-Path $runner "deckhand-elevated-helper.exe"
          & $sidecar --version
          if ($LASTEXITCODE -ne 0) {
            throw "sidecar version smoke failed: $sidecar"
          }
          $events = Join-Path $env:TEMP ("deckhand-helper-smoke-{0}.jsonl" -f ([guid]::NewGuid().ToString("N")))
          try {
            & $helper version --events-file $events
            if ($LASTEXITCODE -ne 0) {
              throw "helper version smoke failed: $helper"
            }
            if (-not (Test-Path -LiteralPath $events -PathType Leaf)) {
              throw "helper smoke did not create an events file: $events"
            }
            $body = Get-Content -LiteralPath $events -Raw
            if ($body -notmatch '"event":"started"' -or $body -notmatch '"event":"version"') {
              throw "helper smoke did not emit started/version events: $events"
            }
          } finally {
            Remove-Item -LiteralPath $events -Force -ErrorAction SilentlyContinue
          }

      - name: Code-sign inner binaries (Authenticode)
        if: ${{ secrets.WINDOWS_SIGN_THUMBPRINT != '' }}
        shell: pwsh
        env:
          SIGNTOOL_CERT_THUMBPRINT: ${{ secrets.WINDOWS_SIGN_THUMBPRINT }}
        run: |
          $ErrorActionPreference = "Stop"
          $signTargets = @()
          $signTargets += Get-ChildItem app\build\windows\x64\runner\Release\*.exe -File
          $signTargets += Get-ChildItem sidecar\dist\*.exe -File
          foreach ($f in $signTargets) {
            & signtool sign `
              /sha1 $env:SIGNTOOL_CERT_THUMBPRINT `
              /tr http://timestamp.digicert.com `
              /td sha256 /fd sha256 $f.FullName
            if ($LASTEXITCODE -ne 0) { throw "signtool failed on $($f.FullName)" }
            & signtool verify /pa /all $f.FullName
            if ($LASTEXITCODE -ne 0) { throw "signtool verify failed on $($f.FullName)" }
          }

      # Inno Setup must be pre-installed on the self-hosted Windows
      # runner (per the org's pre-installed-toolchain policy). The
      # previous `nextgens/inno-setup-action@v1.0.11` reference was
      # bitrot — that repo does not exist on GitHub. Drop the action
      # entirely and rely on the runner's pre-installed iscc.
      - name: Build installer
        shell: pwsh
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: iscc /dVersion=$env:VERSION packaging\windows\deckhand.iss

      - name: Code-sign installer (Authenticode)
        if: ${{ secrets.WINDOWS_SIGN_THUMBPRINT != '' }}
        shell: pwsh
        env:
          SIGNTOOL_CERT_THUMBPRINT: ${{ secrets.WINDOWS_SIGN_THUMBPRINT }}
        run: |
          $ErrorActionPreference = "Stop"
          $signTargets = Get-ChildItem packaging\windows\dist\*.exe -File
          foreach ($f in $signTargets) {
            & signtool sign `
              /sha1 $env:SIGNTOOL_CERT_THUMBPRINT `
              /tr http://timestamp.digicert.com `
              /td sha256 /fd sha256 $f.FullName
            if ($LASTEXITCODE -ne 0) { throw "signtool failed on $($f.FullName)" }
            & signtool verify /pa /all $f.FullName
            if ($LASTEXITCODE -ne 0) { throw "signtool verify failed on $($f.FullName)" }
          }

      - name: Warn when cert absent
        if: ${{ secrets.WINDOWS_SIGN_THUMBPRINT == '' }}
        shell: pwsh
        run: |
          Write-Warning "WINDOWS_SIGN_THUMBPRINT not set; shipping UNSIGNED installer."
          Write-Warning "Unsigned installers will trigger SmartScreen warnings on end-user machines."

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: deckhand-windows
          path: packaging/windows/dist/*
          if-no-files-found: error

  macos:
    name: macOS (DMG)
    needs: [version, go-binaries]
    runs-on: [self-hosted, macos]
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with: { ref: "${{ needs.version.outputs.ref }}" }

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2  # v2
        with:
          flutter-version: "3.38.9"
          channel: stable
          cache: true

      - name: Download Go binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: go-darwin-${{ matrix.arch }}
          path: sidecar/dist

      - name: Pub get
        working-directory: app
        run: flutter pub get

      - name: Ensure platform dirs
        working-directory: app
        run: flutter create --platforms=macos --project-name=deckhand .

      - name: Flutter build
        working-directory: app
        env:
          VERSION: ${{ needs.version.outputs.version }}
          BUILD: ${{ needs.version.outputs.build }}
        run: flutter build macos --release --build-name="$VERSION" --build-number="$BUILD" --dart-define="DECKHAND_VERSION=$VERSION+$BUILD"

      - name: Import signing certificate
        if: ${{ secrets.MACOS_SIGN_CERT_P12 != '' }}
        env:
          MACOS_SIGN_CERT_P12: ${{ secrets.MACOS_SIGN_CERT_P12 }}
          MACOS_SIGN_CERT_PASSWORD: ${{ secrets.MACOS_SIGN_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          echo "$MACOS_SIGN_CERT_P12" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import /tmp/cert.p12 -k build.keychain \
            -P "$MACOS_SIGN_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productsign
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm -f /tmp/cert.p12

      - name: Build DMG
        env:
          MACOS_SIGN_ID: ${{ secrets.MACOS_SIGN_ID }}
          MACOS_NOTARIZE_APPLE_ID: ${{ secrets.MACOS_NOTARIZE_APPLE_ID }}
          MACOS_NOTARIZE_PASSWORD: ${{ secrets.MACOS_NOTARIZE_PASSWORD }}
          MACOS_NOTARIZE_TEAM_ID: ${{ secrets.MACOS_NOTARIZE_TEAM_ID }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          if [ -z "${MACOS_SIGN_ID}" ]; then
            echo "::warning ::MACOS_SIGN_ID not set; shipping UNSIGNED .app (Gatekeeper will block)."
          fi
          chmod +x packaging/macos/build_dmg.sh
          ./packaging/macos/build_dmg.sh "$VERSION-${{ matrix.arch }}"

      - name: Verify notarization
        if: ${{ secrets.MACOS_SIGN_ID != '' }}
        run: |
          set -euo pipefail
          for dmg in packaging/macos/dist/*.dmg; do
            echo "Verifying $dmg"
            spctl --assess --type open --context context:primary-signature -vv "$dmg"
            xcrun stapler validate "$dmg"
          done

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: deckhand-macos-${{ matrix.arch }}
          path: packaging/macos/dist/*
          if-no-files-found: error

  linux:
    name: Linux (AppImage)
    needs: [version, go-binaries]
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with: { ref: "${{ needs.version.outputs.ref }}" }

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2  # v2
        with:
          flutter-version: "3.38.9"
          channel: stable
          cache: true

      - name: Download Go binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: go-linux-amd64
          path: sidecar/dist

      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake libgtk-3-dev libsecret-1-dev file

      - name: Pub get
        working-directory: app
        run: flutter pub get

      - name: Ensure platform dirs
        working-directory: app
        run: flutter create --platforms=linux --project-name=deckhand .

      - name: Flutter build
        working-directory: app
        env:
          VERSION: ${{ needs.version.outputs.version }}
          BUILD: ${{ needs.version.outputs.build }}
        run: flutter build linux --release --build-name="$VERSION" --build-number="$BUILD" --dart-define="DECKHAND_VERSION=$VERSION+$BUILD"

      - name: Install appimagetool
        run: |
          set -euo pipefail
          APPIMAGETOOL_VERSION="1.9.1"
          APPIMAGETOOL_SHA256="ed4ce84f0d9caff66f50bcca6ff6f35aae54ce8135408b3fa33abfc3cb384eb0"
          wget -q "https://github.com/AppImage/appimagetool/releases/download/${APPIMAGETOOL_VERSION}/appimagetool-x86_64.AppImage" -O /tmp/appimagetool
          echo "${APPIMAGETOOL_SHA256}  /tmp/appimagetool" | sha256sum --check --status
          chmod +x /tmp/appimagetool
          sudo mv /tmp/appimagetool /usr/local/bin/appimagetool

      - name: Build AppImage
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          chmod +x packaging/linux/build_appimage.sh
          ./packaging/linux/build_appimage.sh "$VERSION"

      - name: GPG-sign AppImage
        if: ${{ secrets.GPG_SIGNING_KEY != '' }}
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_KEY_PASSPHRASE: ${{ secrets.GPG_SIGNING_KEY_PASSPHRASE }}
        run: |
          set -euo pipefail
          echo "$GPG_SIGNING_KEY" | gpg --batch --import
          for f in packaging/linux/dist/*.AppImage; do
            echo "Signing $f"
            gpg --batch --yes --pinentry-mode loopback \
              --passphrase "$GPG_SIGNING_KEY_PASSPHRASE" \
              --detach-sign --armor \
              --output "${f}.asc" "$f"
          done

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: deckhand-linux
          path: packaging/linux/dist/*
          if-no-files-found: error

  # ------------------------------------------------------------------
  # Tag the commit + publish a GitHub Release with every artifact.
  # ------------------------------------------------------------------
  release:
    name: Publish release
    needs: [version, windows, macos, linux]
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.version.outputs.ref }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: release-artifacts
          merge-multiple: false

      - name: Install syft
        # Pin to a specific syft release tarball + verify the SHA256
        # against the known hash for v1.18.1. The previous
        # `curl … | sudo sh` pattern fetched install.sh from
        # raw.githubusercontent.com unverified - a network MitM or a
        # GitHub-side compromise of the install.sh ref would land
        # arbitrary code as root on the release runner. SHA pinning
        # closes that.
        run: |
          set -euo pipefail
          SYFT_VERSION="1.18.1"
          SYFT_SHA256="066c251652221e4d44fcc4d115ce3df33a91769da38c830a8533199db2f65aab"
          TARBALL="syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          curl -fsSLO "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/${TARBALL}"
          echo "${SYFT_SHA256}  ${TARBALL}" | sha256sum --check --status
          tar -xzf "${TARBALL}" syft
          sudo install -m0755 syft /usr/local/bin/syft
          rm -f "${TARBALL}" syft
          syft version

      - name: Generate SBOMs (SPDX + CycloneDX)
        run: |
          set -euo pipefail
          # Single syft invocation per format keeps the SBOMs over an
          # identical scan of the same dir tree. The previous
          # anchore/sbom-action call ran the same scanner twice with
          # subtly different defaults — same end result on disk, but
          # half the run time and one fewer GHA dependency to vet.
          syft scan dir:. \
            --output spdx-json=release-artifacts/sbom.spdx.json \
            --output cyclonedx-json=release-artifacts/sbom.cdx.json \
            --quiet

      - name: Build release manifest.json
        env:
          VERSION: ${{ needs.version.outputs.version }}
          BUILD: ${{ needs.version.outputs.build }}
          TAG: ${{ needs.version.outputs.tag }}
          REF: ${{ needs.version.outputs.ref }}
        run: |
          set -euo pipefail
          DOWNLOAD_BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          python3 scripts/build_manifest.py \
            --version "$VERSION" --build "$BUILD" \
            --tag "$TAG" --ref "$REF" \
            --artifacts-dir release-artifacts \
            --output release-artifacts/manifest.json \
            --download-base "$DOWNLOAD_BASE"
          cat release-artifacts/manifest.json

      - name: Compute SHA256SUMS
        run: |
          set -euo pipefail
          cd release-artifacts
          find . -type f \
            ! -name 'SHA256SUMS*' \
            ! -name '*.asc' \
            ! -name '*.sig' \
            -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
          cat SHA256SUMS

      - name: SLSA provenance digest
        id: provenance
        run: |
          set -euo pipefail
          # Hash every release artifact so the release body can carry
          # a single line the user can pipe to `sha256sum -c` locally.
          SUMS=$(cd release-artifacts && find . -type f \
            ! -name 'SHA256SUMS*' ! -name '*.asc' \
            -print0 | sort -z | xargs -0 sha256sum)
          {
            echo "digests<<EOF"
            echo "$SUMS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Sign SHA256SUMS
        if: ${{ secrets.GPG_SIGNING_KEY != '' }}
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_KEY_PASSPHRASE: ${{ secrets.GPG_SIGNING_KEY_PASSPHRASE }}
        run: |
          set -euo pipefail
          echo "$GPG_SIGNING_KEY" | gpg --batch --import
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$GPG_SIGNING_KEY_PASSPHRASE" \
            --detach-sign --armor \
            --output release-artifacts/SHA256SUMS.asc \
            release-artifacts/SHA256SUMS

      - name: Stamp CHANGELOG with the resolved tag
        env:
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          set -euo pipefail
          # Replace the leading `## Unreleased` heading with the
          # actual tag + today's date. Idempotent: re-running on an
          # already-stamped CHANGELOG is a no-op (e.g. workflow_dispatch
          # rebuild of the same ref). Committed-and-pushed alongside
          # the tag below so consumers reading the source tarball see
          # the resolved heading.
          bash scripts/stamp_changelog.sh "$TAG" "$(date -u +%Y-%m-%d)"

      - name: Create tag
        env:
          TAG: ${{ needs.version.outputs.tag }}
          REF: ${{ needs.version.outputs.ref }}
        run: |
          git config user.name  'cepheus-labs-bot'
          git config user.email 'support@cepheuslabs.com'
          # Commit the stamped CHANGELOG so the tag points at a
          # source tree where the heading already names the tag.
          if ! git diff --quiet -- CHANGELOG.md; then
            git add CHANGELOG.md
            git commit -m "chore: stamp CHANGELOG for $TAG"
          fi
          if git rev-parse --verify --quiet "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists — reusing."
          else
            git tag -a "$TAG" -m "Deckhand $TAG"
            git push origin HEAD:main
            git push origin "$TAG"
          fi

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Deckhand ${{ needs.version.outputs.version }}+${{ needs.version.outputs.build }}
          files: release-artifacts/**/*
          draft: false
          generate_release_notes: true
