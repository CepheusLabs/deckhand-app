name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------
  # Go sidecar — builds on all three OSs, runs vet + tests everywhere.
  # ---------------------------------------------------------------
  sidecar:
    name: Sidecar (${{ matrix.os }})
    # Self-hosted runners must not execute code from forked PRs.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        # The org's policy is "self-hosted runners only — no
        # GitHub-hosted minutes are paid for." Each row pairs the
        # OS-shorthand label (used in conditionals like
        # `if: matrix.os == 'linux'`) with the runner-label tuple
        # GitHub uses to pick a physical runner. If a target OS
        # has no registered runner the job queues forever — that's
        # by design.
        include:
          - os: linux
            runs-on: [self-hosted, linux]
          - os: macos
            runs-on: [self-hosted, macos]
          - os: windows
            runs-on: [self-hosted, windows]
    runs-on: ${{ matrix.runs-on }}
    defaults:
      run:
        working-directory: sidecar
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # Toolchain is pre-installed on every self-hosted runner the
      # org operates. Verify visibility instead of installing on
      # top — the install path drifted from dev box state and
      # produced subtle issues (e.g. macOS LC_UUID-stripped test
      # binaries from the action's downloaded Go).
      - name: Verify go
        run: go version

      - name: go mod download
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      # Cross-OS tricks for `go test`:
      #
      #  - On Windows we cannot rely on `shell: bash` — the runner
      #    agent resolves it to the WSL bash stub at
      #    `C:\WINDOWS\system32\bash.EXE`, which has no installed
      #    distro. We use `shell: pwsh` instead and feed Go via the
      #    `--%` stop-parsing token so PowerShell does not mangle
      #    the `-coverprofile=...` form into `coverage` and `.out`.
      #
      #  - On macOS we drop `-race` because Go's race-runtime test
      #    binaries can ship without an LC_UUID load command, and
      #    macOS dyld then refuses to load them (`signal: abort
      #    trap`). The race detector finds OS-agnostic data races,
      #    so the Linux run is the canonical race-testing path —
      #    the macOS run still validates that all packages
      #    build and test on darwin.
      #
      #  - Linux is the canonical full run: race + coverage; the
      #    coverage gate below consumes coverage.out from this step.
      - name: go test (linux)
        if: matrix.os == 'linux'
        shell: bash
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: go test (macos)
        if: matrix.os == 'macos'
        shell: bash
        run: go test -count=1 ./...

      - name: go test (windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          & go test --% -race -count=1 -coverprofile=coverage.out ./...
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Coverage gate (overall + per-package)
        if: matrix.os == 'linux'
        shell: bash
        run: |
          set -euo pipefail

          report() { go tool cover -func=coverage.out; }

          # Overall floor — a hard ceiling on regression. Disk I/O
          # paths are genuinely hardware-bound, so this number can't
          # approach 100%. Raise as the test surface grows; never
          # lower without explicit justification in the PR.
          total=$(report | awk '/^total:/ {print $3}')
          echo "Sidecar coverage (total): $total"
          min_total=55
          awk -v a="${total%\%}" -v b="$min_total" \
            'BEGIN { if (a + 0 < b + 0) exit 1 }' \
            || { echo "::error::total coverage $total below ${min_total}% floor"; exit 1; }

          # Per-package floors. These call out the packages that are
          # NOT hardware-bound and therefore expected to stay
          # well-covered. A regression in any of them (a new
          # untested function) trips the gate even if the global
          # number stays acceptable.
          declare -A min_pkg=(
            [internal/rpc]=85
            [internal/logging]=80
            [internal/hash]=80
            [internal/doctor]=70
            [internal/disks]=70
          )
          for pkg in "${!min_pkg[@]}"; do
            actual=$(report | awk -v p="$pkg/" '$1 ~ p {gsub("%","",$3); s+=$3; n++} END { if (n==0) print 0; else printf "%.1f", s/n }')
            floor=${min_pkg[$pkg]}
            echo "$pkg coverage: ${actual}%  (floor ${floor}%)"
            awk -v a="$actual" -v b="$floor" \
              'BEGIN { if (a + 0 < b + 0) exit 1 }' \
              || { echo "::error::$pkg coverage ${actual}% below ${floor}% floor"; exit 1; }
          done

      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20  # v9.2.0
        if: matrix.os == 'linux'
        with:
          version: v2.1.6
          working-directory: sidecar
          args: --timeout=5m

      - name: Verify IPC-METHODS.md is up-to-date
        if: matrix.os == 'linux'
        run: |
          go run ./cmd/deckhand-ipc-docs --check
        working-directory: sidecar

  # ---------------------------------------------------------------
  # Flutter / Dart packages — analyze + test + format each package in
  # the monorepo. Runs on Ubuntu; analyze is platform-agnostic.
  # ---------------------------------------------------------------
  flutter:
    name: Flutter packages
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    # Self-hosted only. Flutter analyze/test is platform-agnostic
    # so any runner OS works; we pin to the Linux self-hosted
    # runner because the `app` matrix entry calls
    # `apt-get install` for libgtk-3-dev/libsecret-1-dev.
    runs-on: [self-hosted, linux]
    strategy:
      matrix:
        package:
          - packages/deckhand_core
          - packages/deckhand_profiles
          - packages/deckhand_ssh
          - packages/deckhand_flash
          - packages/deckhand_discovery
          - packages/deckhand_hitl
          - packages/deckhand_ui
          - packages/deckhand_profile_script
          - packages/deckhand_profile_lint
          - packages/deckhand_lints
          - app
      fail-fast: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2  # v2
        with:
          flutter-version: "3.38.9"
          channel: stable
          cache: true

      - name: Linux system deps (for the app's platform build)
        if: matrix.package == 'app'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake libgtk-3-dev libsecret-1-dev

      - name: pub get
        working-directory: ${{ matrix.package }}
        run: flutter pub get

      - name: analyze
        working-directory: ${{ matrix.package }}
        run: flutter analyze --fatal-infos

      - name: format check
        working-directory: ${{ matrix.package }}
        run: dart format --output=none --set-exit-if-changed .

      - name: test
        working-directory: ${{ matrix.package }}
        run: |
          if [ -d test ]; then
            flutter test --coverage --reporter=expanded
          else
            echo "No test/ directory in ${{ matrix.package }} — skipping."
          fi

      # Per-package Dart coverage floor. Hardware-bound packages
      # (deckhand_flash, deckhand_discovery, deckhand_ssh) have lower
      # floors because their code paths require a real printer; the
      # pure-logic packages stay tight. Set to 0 to opt out (config-
      # only packages like deckhand_lints).
      - name: Coverage floor
        if: hashFiles(format('{0}/coverage/lcov.info', matrix.package)) != ''
        working-directory: ${{ matrix.package }}
        shell: bash
        run: |
          set -euo pipefail
          # Compute hits/found across the whole package. lcov.info is
          # a sequence of `LH:<n>` (lines hit) + `LF:<n>` (lines
          # found) records; awk sums them and emits a percentage.
          read hit found < <(
            awk -F: '/^LH:/{h+=$2} /^LF:/{f+=$2} END {print h, f}' \
              coverage/lcov.info
          )
          if [ "$found" = "0" ]; then
            echo "No lines covered in ${{ matrix.package }}; skipping floor"
            exit 0
          fi
          pct=$(awk -v h="$hit" -v f="$found" 'BEGIN { printf "%.1f", (h*100)/f }')
          case "${{ matrix.package }}" in
            packages/deckhand_core)            floor=70 ;;
            packages/deckhand_ui)              floor=60 ;;
            packages/deckhand_profile_script)  floor=80 ;;
            packages/deckhand_profile_lint)    floor=80 ;;
            packages/deckhand_profiles)        floor=40 ;;
            packages/deckhand_ssh)             floor=20 ;;
            packages/deckhand_flash)           floor=30 ;;
            packages/deckhand_discovery)       floor=30 ;;
            packages/deckhand_hitl)            floor=40 ;;
            *)                                 floor=0  ;;
          esac
          echo "${{ matrix.package }} coverage: ${pct}% (floor ${floor}%)"
          awk -v a="$pct" -v b="$floor" \
            'BEGIN { if (a + 0 < b + 0) exit 1 }' \
            || { echo "::error::${{ matrix.package }} coverage ${pct}% below ${floor}% floor"; exit 1; }

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-${{ github.run_id }}-${{ strategy.job-index }}
          path: ${{ matrix.package }}/coverage/lcov.info
          if-no-files-found: ignore
          retention-days: 7

  # ---------------------------------------------------------------
  # Validate every profile.yaml in deckhand-profiles. Builds the lint
  # binary from sources and runs it over a shallow clone of the
  # builds repo.
  # ---------------------------------------------------------------
  scripts:
    name: Python scripts
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Run scripts test suite
        run: python -m unittest discover -s scripts -p 'test_*.py' -v

  profile-lint:
    name: Profile YAML lint
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2  # v2
        with:
          flutter-version: "3.38.9"
          channel: stable
          cache: true

      - name: Shallow-clone deckhand-profiles
        env:
          DECKHAND_PROFILES_REF: ${{ vars.DECKHAND_PROFILES_REF }}
        run: |
          ref="${DECKHAND_PROFILES_REF:-main}"
          git clone --depth=1 --branch "$ref" https://github.com/CepheusLabs/deckhand-profiles.git builds

      - name: Pub get
        working-directory: packages/deckhand_profile_lint
        run: dart pub get

      - name: Lint every profile
        working-directory: packages/deckhand_profile_lint
        run: dart run bin/deckhand_profile_lint.dart --root ../../builds --schema ../../builds/schema/profile.schema.json --strict
