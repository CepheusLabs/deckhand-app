name: Sync labels

# Reconciles GitHub labels against `.github/labels.yml`. Dependabot
# does NOT auto-create labels — it silently drops any that don't
# exist. Running this workflow on every change to labels.yml (and
# manually) keeps the repo's label set in sync with what
# dependabot.yml + the issue templates assume exists.

on:
  push:
    branches: [main]
    paths: ['.github/labels.yml', '.github/workflows/labels.yml']
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  sync:
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: EndBug/label-sync@52074158190acb45f3077f9099fea818aa43f97a  # v2
        with:
          config-file: .github/labels.yml
          delete-other-labels: false
          dry-run: false
