name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Maintain release PR
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # Prefer a PAT so tags created by this workflow fire the
          # release.yml tag-push trigger. With the default GITHUB_TOKEN,
          # downstream workflows are suppressed (GitHub's recursion
          # guard). Falls back to GITHUB_TOKEN if the secret isn't set.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: main

      # If a release PR was just merged, release-please created a tag
      # (e.g., v0.1.0). The existing .github/workflows/release.yml fires
      # on tag push and produces the installers. No action needed here
      # beyond the tag itself.
      - name: Summary
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: |
          echo "Tagged ${{ steps.release.outputs.tag_name }} — release.yml is building installers."
