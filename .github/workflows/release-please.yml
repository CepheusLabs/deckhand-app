name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Maintain release PR
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: main

      # If a release PR was just merged, release-please created a tag
      # (e.g., v0.1.0). The existing .github/workflows/release.yml fires
      # on tag push and produces the installers. No action needed here
      # beyond the tag itself.
      - name: Summary
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: |
          echo "Tagged ${{ steps.release.outputs.tag_name }} — release.yml is building installers."
