name: deckhand_profile_lint
description: >
  CLI that validates every profile.yaml in a deckhand-profiles checkout
  against profile.schema.json, plus registry.yaml cross-references.
  Runs in CI on the deckhand-profiles repo so malformed or dangerous
  profiles can't be tagged and consumed by Deckhand clients.
publish_to: none
version: 0.1.0

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  yaml: ^3.1.2
  json_schema: ^5.2.0
  args: ^2.5.0
  path: ^1.9.0

dev_dependencies:
  lints: ^6.1.0
  test: ^1.25.0
