name: deckhand_core
description: Models, service interfaces, and wizard state machine for Deckhand. Pure Dart — no Flutter runtime dependency, so the headless HITL driver can compile against it without dragging Flutter UI types into the AOT build.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.10.0

dependencies:
  # archive is pinned (not a caret range) so every package in the
  # workspace resolves to the same version. A previous round saw
  # deckhand_core get archive 3.6.1 from a stale lockfile while
  # deckhand_flash resolved 4.0.9 from a fresh `pub get`, which
  # surfaced as `ArchiveFile not found` errors that only manifested
  # under `flutter clean`. Hard-pinning eliminates the drift.
  archive: 4.0.9
  crypto: ^3.0.5
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  meta: ^1.15.0
  path: ^1.9.0
  yaml: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  deckhand_lints:
    path: ../deckhand_lints
