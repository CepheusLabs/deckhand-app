name: deckhand_profile_script
description: |
  Sandboxed API surface for Dart scripts shipped inside printer profiles.
  Profile authors import this when writing `scripts/*.dart` files used by
  wizard decision logic.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  deckhand_core:
    path: ../deckhand_core

dev_dependencies:
  flutter_test:
    sdk: flutter
  deckhand_lints:
    path: ../deckhand_lints
