name: deckhand_ui
description: Wizard screens and shared Flutter widgets for Deckhand.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  deckhand_core:
    path: ../deckhand_core
  flutter_riverpod: ^2.6.1
  go_router: ^14.0.0
  path: ^1.9.0
  slang: ^4.0.0
  slang_flutter: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  deckhand_lints:
    path: ../deckhand_lints

flutter:
  uses-material-design: true
  fonts:
    - family: IBMPlexSans
      fonts:
        - asset: assets/fonts/IBMPlexSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexSans-Bold.ttf
          weight: 700
    - family: IBMPlexMono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexMono-SemiBold.ttf
          weight: 600
