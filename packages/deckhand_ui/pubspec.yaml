name: deckhand_ui
description: Wizard screens and shared Flutter widgets for Deckhand.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  deckhand_core:
    path: ../deckhand_core
  forge:
    path: ../../shared/forge
  flutter_riverpod: ^2.6.1
  go_router: ^14.0.0
  path: ^1.9.0
  printdeck_product_platform:
    path: ../../shared/printdeck/product_platform
  slang: ^4.0.0
  slang_flutter: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  deckhand_lints:
    path: ../deckhand_lints

flutter:
  uses-material-design: true
  # Fonts (Geist / GeistMono) are provided transitively by the forge
  # package dependency. IBM Plex was dropped in the forge migration
  # (see docs/FORGE-MIGRATION.md).
