firmware:
  title: Pick your firmware
  helper: |
    Kalico is a community-maintained Klipper fork with weekly rebases
    and helpful extras (gcode_shell_command, danger_options). Mainline
    Klipper is upstream/master - more conservative.

webui:
  title: Which web interface?
  helper: |
    Web dashboards for controlling the printer from a browser. They
    both talk to the same backend (Moonraker), so you can install
    both and switch between them any time.
  requirement_ok: Pick at least one. This step cannot be skipped.
  requirement_missing: Pick at least one to continue.

