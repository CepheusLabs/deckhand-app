# Deckhand UI - English strings
#
# Slang loads these at build time and generates `translations.g.dart`.
# UI code references strings via `t.<path>` (e.g., `t.welcome.title`).
#
# Principles:
#   - Keys are English-biased namespaces (screen or feature), values are
#     the actual copy.
#   - Longer copy uses block scalar (|) to preserve line breaks.
#   - Interpolations use Slang's $variable syntax where needed.

welcome:
  title: Welcome to Deckhand
  helper: |
    Flash, set up, and maintain Klipper-based printers. This wizard walks
    you through replacing vendor firmware with Kalico or Klipper end-to-
    end, either in place on your existing OS or on a fresh install.
  action_start: Start
  action_settings: Settings
  card_first_time:
    title: First time here?
    body: |
      The wizard will ask which printer you have, try to reach it over
      SSH using known default credentials, then let you pick what you
      want to replace and what you want to keep.
  card_safety:
    title: Safety
    body: |
      Nothing destructive happens without explicit confirmation. Deckhand
      can back up your entire eMMC to an image before any firmware swap,
      so you always have a route back to stock.

pick_printer:
  title: Which printer are you setting up?
  helper: |
    Deckhand supports these printers. Pick yours - we use that choice to
    load the right profile before anything else.
  show_stubs: Show stub profiles
  no_printer_link: My printer isn't here →
  action_continue: Continue
  action_back: Back
  registry_error: "Failed to load printer registry: $error"

connect:
  title: Connect to your printer
  helper: |
    Deckhand scans your LAN two ways: mDNS for printers that advertise
    Moonraker, and a TCP sweep of port 7125 across your local subnet.
    Each host is probed to see whether it matches your selected
    profile - confirmed matches surface at the top.
  field_host: Host or IP
  hint_host: e.g. 192.168.1.50 or mkspi.local
  action_connect: Connect
  action_connecting: Connecting…
  action_rescan: Rescan
  host_key_title_new: First time connecting to this printer
  host_key_body_new: |
    Deckhand has not seen this printer before. Compare the fingerprint
    below against what the printer reports locally. If it matches,
    accept it and Deckhand will remember it for future connections.
  host_key_confirm_new: Accept and connect
  host_key_title_mismatch: This printer's SSH fingerprint changed
  host_key_body_mismatch: |
    The fingerprint presented by this printer does not match the one
    Deckhand saved previously. This can happen if you reinstalled the
    printer's OS, but it can also indicate something is intercepting
    the connection. If you expected this change, clear the pinned
    fingerprint in Settings and try again.
  section_discovered: Found on your network
  section_manual: Or enter manually
  empty_state: |
    Nothing responded on port 7125 across your local subnet, and no
    Moonraker mDNS advertisements were seen either. Your printer may be
    on a different VLAN, behind a firewall, or using a non-default
    port - enter the IP/hostname below.
  match_confirmed: Looks like your $profile
  match_probable: Probably your $profile
  match_miss: Does not look like $profile
  match_checking: Checking...
  reason_marker_with_id: installed by Deckhand as $profileId
  reason_marker_generic: Deckhand marker file present
  reason_object: Klipper config uses `$object`
  reason_hostname: hostname `$hostname` matches profile
  semantics_confirmed: "confirmed match for $profile$reason"
  semantics_probable: "probable match for $profile$reason"
  semantics_miss: "does not match $profile"
  semantics_unknown: "match status unknown"

verify:
  title: Verify your printer
  helper: |
    We'll run a few quick checks against your connected printer to
    confirm this profile matches. Warnings don't block the wizard - you
    can always proceed.
  action_continue: Continue
  action_back: Back

choose_path:
  title: Which path do you want to take?
  helper: |
    Choose whether to reuse the OS already on your printer or wipe the
    eMMC and install a fresh Armbian image. Both lead to the same final
    state (Kalico or Klipper + your chosen web UI); they differ in blast
    radius and in what you have to manage yourself.
  stock:
    title: Keep my current OS
    body: |
      Transforms your printer in place. Snapshots the stock Klipper
      install, then swaps in the firmware you pick. Any vendor services
      you don't want are disabled or removed per your selections.
  fresh:
    title: Flash a new OS
    body: |
      Wipes the eMMC and installs a clean Armbian image. Strongly
      preferred if you have an eMMC-to-USB adapter handy and want a
      fully known-good base.
  action_continue: Continue
  action_back: Back

