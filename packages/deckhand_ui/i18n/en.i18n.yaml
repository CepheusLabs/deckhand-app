review:
  title: Review your choices
  helper: |
    Every decision you made is listed below, plus every file Deckhand
    is about to touch on the printer. Deckhand auto-snapshots each
    target before overwriting (you can restore from the Verify
    screen), but it is cheaper to catch a mistake now.
  flow_line: "Setup path: $flow"
  printer_line: "Printer: $printer"
  host_line: "SSH host: $host"
  flow_stock_keep: Keep the stock OS
  flow_fresh_flash: Fresh OS install
  flow_unknown: Not yet chosen
  your_decisions: Your decisions
  plan_heading: What this will touch
  plan_explainer: |
    Generated from the profile's step list for the "$flow" path.
    Anything written here is backed up before it is overwritten.
  plan_empty: No file-changing steps are queued for this flow.
  confirm: I understand and want to proceed.
  action_start: Start install

progress:
  choose_one_unknown_label: Options unavailable
  choose_one_unknown_subtitle: |
    The profile asked for a list via `$field` but Deckhand doesn't
    know how to resolve that key. Check the profile or report a bug.
  title_installing: Installing...
  title_done: All done
  title_failed: Something went wrong
  title_working: Working...
  # Phase-aware titles keyed by step kind. The progress screen looks
  # up the currently-running step's kind and picks the matching title.
  phase_os_download: Downloading image
  phase_flash_disk: Writing image
  phase_wait_for_ssh: Waiting for the printer to come back
  phase_install_firmware: Installing firmware
  phase_install_stack: Installing Moonraker + web UI
  phase_link_extras: Copying Klipper extras
  phase_install_screen: Installing the touchscreen UI
  phase_flash_mcus: MCU flashing unavailable
  phase_apply_services: Cleaning up stock services
  phase_apply_files: Cleaning up stock files
  phase_snapshot_paths: Backing up stock files
  phase_write_file: Writing config
  phase_install_marker: Marking this printer as Deckhand-managed
  phase_verify: Verifying
  phase_script: Running setup script
  phase_ssh_commands: Running remote commands
  phase_conditional: Evaluating condition
  action_finish: Finish
  action_close: Close
  action_running: Running...
  action_cancel: Cancel install
  action_cancel_requested: Cancel requested...
  title_cancelled: Install canceled
  helper_cancelled: Deckhand stopped before starting another queued step.
  cancel_title: Cancel install?
  cancel_body: |
    Deckhand will stop before the next queued step. If the current
    command is already running, it may finish before cancellation
    takes effect.
  cancel_keep_running: Keep running
  cancel_confirm: Cancel install
  banner_cancelled_title: Run canceled
  prompt_default_title: One moment
  prompt_default_action: Continue
  choose_one_default_title: Pick one
  choose_one_ok: OK
  disk_picker_title: Pick the target disk
  disk_picker_cancel: Cancel
  disk_picker_confirm: Use this disk
  disk_picker_no_disks_title: No removable disks found
  disk_picker_no_disks_body: |
    Plug the printer eMMC into a USB adapter, then try again. Internal
    disks are dimmed here to prevent accidents.
  disk_picker_list_error_title: Could not list disks
  semantics_progress_label: Current step progress
  semantics_progress_indeterminate: indeterminate
  semantics_progress_percent: $percent percent
  semantics_log_label: Step execution log

done:
  title: Setup complete
  helper: |
    Your printer is running community firmware with the configuration
    you picked. Deckhand's job ends here - day-to-day updates happen
    from the printer's web interface.
  a11y_success: Setup succeeded
  connected_host: "Connected to $host"
  next_steps_heading: Next steps
  tip_webui: "Open $name in your browser at http://$host:$port"
  tip_updates: |
    Updates run from the web interface's Update Manager - you do not
    need Deckhand for them.
  tip_tweaks: |
    To add, remove, or reinstall pieces later, SSH into the printer
    and run the KIAUH helper from your home directory.
  action_another: Set up another printer

settings:
  title: Settings
  section_profiles: Printer profiles
  profiles_local_dir_label: Local profiles directory
  profiles_local_dir_hint: |
    Point Deckhand at a checked-out copy of deckhand-profiles on this
    machine instead of fetching main from GitHub. Useful for profile
    authoring. Leave empty to fetch from GitHub.
  profiles_local_dir_active: Using local dir
  profiles_local_dir_github: Fetching from GitHub
  profiles_local_dir_pick: Pick folder...
  profiles_local_dir_clear: Clear
  profiles_local_dir_invalid: Directory not found or unreadable.

